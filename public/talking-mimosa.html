<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Talking Product | Powerwyze Kiosk</title>
    <link rel="stylesheet" href="styles/main.css" />
    <link rel="stylesheet" href="styles/home-v2.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "./vendor/three/build/three.module.js"
        }
      }
    </script>
  </head>
  <body class="v2-shell">
    <div class="kiosk-frame"></div>
    <div class="kiosk-content">
      <video class="video-background" autoplay loop muted playsinline>
        <source src="assets/sobeloop.mp4" type="video/mp4">
      </video>
      <header class="landing-shell">
      <div class="landing-shell__inner">
        <h2 class="kiosk-header-title">Kiosk Examples:</h2>
        <nav class="kiosk-nav">
          <a href="camera.html" class="kiosk-nav__button">Photo Booth</a>
          <a href="talking-mimosa.html" class="kiosk-nav__button kiosk-nav__button--active">Talking Product</a>
          <a href="company-discover.html" class="kiosk-nav__button">Company Discover</a>
        </nav>
      </div>
    </header>
    <section class="v2-backdrop"></section>
    <section class="v2-shell__grain"></section>

    <main class="v2-main">
      <section class="v2-hero">
        <div class="v2-wave v2-wave--left"></div>
        <div class="v2-wave v2-wave--right"></div>
        <p class="v2-eyebrow">Interactive Product Display</p>
        <h1>Browse Bartenura</h1>
        <p class="v2-copy">
          Step into a beach day display with cinematic can cards and glossy highlights.
        </p>
      </section>

      <section class="v2-grid" id="gallery"></section>
      <div class="v2-grid-empty" id="gallery-empty" hidden>
        Products will show up here once they are added to the kiosk data file.
      </div>
    </main>

    <div class="v2-modal" id="v2-modal" hidden>
      <div class="v2-modal__panel">
        <button class="v2-modal__close" type="button" aria-label="Close" data-v2-close>×</button>
        <div class="v2-modal__body">
          <div class="v2-modal__media">
            <canvas id="v2-viewer" class="v2-viewer"></canvas>
          </div>
          <div class="v2-modal__content">
            <p class="v2-modal__badge" data-v2-brand></p>
            <h2 class="v2-modal__name" data-v2-name></h2>
            <p class="v2-modal__description" data-v2-description></p>
          </div>
        </div>
      </div>
    </div>

    <script src="scripts/gallery.js" type="module"></script>
    </div>
  </body>
</html>
